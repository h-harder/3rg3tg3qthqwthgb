<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home Chat</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="page">
    <section id="authPanel" class="auth-card">
      <div class="brand-block">
        <div class="brand-mark">HC</div>
        <div>
          <h1 id="authTitle">Home Chat</h1>
          <p>The first account created becomes the moderator.</p>
        </div>
      </div>

      <div class="auth-grid">
        <form id="loginForm" class="panel">
          <h2>Log in</h2>
          <label>Username
            <input name="username" autocomplete="username" required />
          </label>
          <label>Password
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">Log in</button>
        </form>

        <form id="registerForm" class="panel">
          <h2>Create account</h2>
          <label>Username
            <input name="username" autocomplete="username" minlength="3" maxlength="20" required />
          </label>
          <label>Display name
            <input name="displayName" autocomplete="name" minlength="2" maxlength="40" required />
          </label>
          <label>Password
            <input name="password" type="password" autocomplete="new-password" minlength="8" required />
          </label>
          <button type="submit">Create account</button>
        </form>
      </div>
      <p id="authMessage" class="message-line"></p>
    </section>

    <section id="appShell" class="app-shell hidden">
      <aside class="sidebar">
        <div class="brand-row">
          <div class="brand-mark small">HC</div>
          <div>
            <h1 id="serverName">Home Chat</h1>
            <p id="meLabel"></p>
          </div>
        </div>

        <nav id="roomList" class="room-list" aria-label="Rooms"></nav>

        <section id="adminPanel" class="admin-panel hidden">
          <div class="admin-header">
            <h2>Moderator</h2>
            <button id="refreshUsersBtn" class="secondary small-button">Refresh</button>
          </div>
          <div id="userList" class="user-list"></div>
        </section>

        <button id="logoutBtn" class="secondary logout-button">Log out</button>
      </aside>

      <section class="chat-panel">
        <header class="chat-header">
          <div>
            <h2 id="currentRoomName">General</h2>
            <p id="roomHint">Messages are saved on this server.</p>
          </div>
        </header>

        <div id="serverEvent" class="server-event hidden"></div>
        <div id="messageList" class="message-list" aria-live="polite"></div>
        <p id="typingLine" class="typing-line"></p>

        <form id="messageForm" class="message-form">
          <textarea id="messageInput" name="body" rows="2" maxlength="1000" placeholder="Write a message..." required></textarea>
          <button type="submit">Send</button>
        </form>
      </section>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
