<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HomeChat</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <section class="card header-card">
      <div>
        <h1>HomeChat</h1>
        <p id="subtitle">Self-hosted local chat</p>
      </div>
      <div id="meBox" class="me-box"></div>
    </section>

    <section id="authCard" class="card hidden">
      <h2 id="authTitle">Sign in</h2>
      <p id="firstAccountNote" class="notice hidden">No accounts exist yet. The first account you create becomes the moderator.</p>
      <form id="authForm">
        <label>
          Username
          <input id="username" autocomplete="username" required minlength="3" maxlength="24" placeholder="Ryan">
        </label>
        <label>
          Password
          <input id="password" type="password" autocomplete="current-password" required minlength="8" placeholder="At least 8 characters">
        </label>
        <button id="authSubmit" type="submit">Sign in</button>
      </form>
      <button id="toggleAuth" class="link-button">Create an account instead</button>
      <p id="authError" class="error"></p>
    </section>

    <section id="chatCard" class="card hidden">
      <div class="chat-topline">
        <h2>Chat</h2>
        <div id="stats" class="stats"></div>
      </div>
      <div id="messages" class="messages" aria-live="polite"></div>
      <form id="messageForm" class="message-form">
        <input id="messageInput" maxlength="2000" placeholder="Type a message..." autocomplete="off">
        <button type="submit">Send</button>
      </form>
    </section>

    <section id="adminCard" class="card hidden">
      <h2>Moderator Panel</h2>
      <div class="admin-grid">
        <div>
          <h3>Users</h3>
          <div id="users"></div>
        </div>
        <div>
          <h3>System Announcement</h3>
          <form id="announcementForm" class="stack">
            <textarea id="announcement" rows="4" maxlength="2000" placeholder="Post a system message..."></textarea>
            <button type="submit">Post Announcement</button>
          </form>
          <p class="muted">More powerful tools are available from the terminal command: <code>homechat</code></p>
        </div>
      </div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
