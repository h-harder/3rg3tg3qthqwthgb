<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HomeChat</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>HomeChat</h1>
        <p id="statusText">Checking session...</p>
      </div>
      <button id="logoutBtn" class="secondary hidden">Log out</button>
    </header>

    <main>
      <section id="authPanel" class="card auth-card">
        <h2>Sign in</h2>
        <p class="muted">Create the first account to become the moderator.</p>
        <div class="tabs">
          <button id="loginTab" class="active">Login</button>
          <button id="registerTab">Create account</button>
        </div>

        <form id="loginForm" class="stack">
          <label>Username<input name="username" autocomplete="username" required /></label>
          <label>Password<input name="password" type="password" autocomplete="current-password" required /></label>
          <button type="submit">Login</button>
        </form>

        <form id="registerForm" class="stack hidden">
          <label>Display name<input name="displayName" autocomplete="name" placeholder="Ryan" /></label>
          <label>Username<input name="username" autocomplete="username" required /></label>
          <label>Password<input name="password" type="password" autocomplete="new-password" minlength="8" required /></label>
          <button type="submit">Create account</button>
        </form>
        <p id="authError" class="error"></p>
      </section>

      <section id="chatPanel" class="chat-layout hidden">
        <section class="card chat-card">
          <div class="chat-header">
            <div>
              <h2>Chat</h2>
              <p id="userLine" class="muted"></p>
            </div>
            <span id="connectionBadge" class="badge">offline</span>
          </div>
          <div id="messages" class="messages" aria-live="polite"></div>
          <form id="messageForm" class="message-form">
            <input id="messageInput" maxlength="2000" placeholder="Type a message..." autocomplete="off" />
            <button type="submit">Send</button>
          </form>
        </section>

        <aside id="adminPanel" class="card admin-card hidden">
          <h2>Moderator</h2>
          <p class="muted">Delete messages, ban users, or promote moderators.</p>
          <button id="refreshAdminBtn" class="secondary">Refresh users</button>
          <div id="usersList" class="users-list"></div>
        </aside>
      </section>
    </main>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
